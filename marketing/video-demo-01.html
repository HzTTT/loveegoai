<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo #01 — 情绪链条是怎么形成的</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Noto Sans SC', sans-serif;
  }

  .phone-frame {
    width: 390px;
    height: 844px;
    background: #FAFAF8;
    border-radius: 40px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 0 60px rgba(0,0,0,0.5);
  }

  /* ===== 开场：标题 ===== */
  .opening-text {
    position: absolute;
    top: 120px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'Noto Serif SC', serif;
    font-size: 26px;
    font-weight: 600;
    color: #1A1412;
    line-height: 1.6;
    opacity: 0;
    animation: fadeInUp 0.8s ease 0.5s forwards;
  }

  /* ===== 考拉 ===== */
  .koala {
    position: absolute;
    bottom: -200px;
    right: -40px;
    width: 200px;
    height: auto;
    z-index: 10;
    animation: koalaEnter 0.8s ease 0.2s forwards;
  }

  .koala.pointing {
    animation: koalaEnter 0.8s ease 0.2s forwards, koalaSlideLeft 0.6s ease 3.5s forwards;
  }

  /* ===== 链条区域 ===== */
  .chain-area {
    position: absolute;
    top: 220px;
    left: 36px;
    right: 36px;
  }

  .chain-step {
    display: flex;
    align-items: center;
    gap: 0;
    margin-bottom: 8px;
    opacity: 0;
  }

  .chain-node {
    background: #F0EBE5;
    border: 2px solid #E0D8CE;
    border-radius: 28px;
    padding: 10px 20px;
    font-size: 15px;
    font-weight: 500;
    color: #3D2E2A;
    white-space: nowrap;
    transition: all 0.5s ease;
  }

  .chain-node.highlight {
    background: #3D2E2A;
    border-color: #3D2E2A;
    color: #FAF7F3;
  }

  .chain-node.key-highlight {
    background: #C47D6D;
    border-color: #C47D6D;
    color: #FAF7F3;
    transform: scale(1.1);
    box-shadow: 0 4px 20px rgba(196,125,109,0.4);
  }

  .chain-arrow {
    width: 40px;
    text-align: center;
    font-size: 20px;
    color: #C4A882;
    flex-shrink: 0;
  }

  .chain-arrow-down {
    text-align: center;
    font-size: 20px;
    color: #C4A882;
    padding: 4px 0;
    margin-left: 60px;
    opacity: 0;
  }

  /* ===== 关键洞见 ===== */
  .insight {
    position: absolute;
    bottom: 200px;
    left: 36px;
    right: 36px;
    text-align: center;
    opacity: 0;
  }

  .insight-text {
    font-family: 'Noto Serif SC', serif;
    font-size: 18px;
    font-weight: 600;
    color: #1A1412;
    line-height: 1.8;
    padding: 20px;
    border-top: 1.5px solid #E8D5CC;
    border-bottom: 1.5px solid #E8D5CC;
  }

  /* ===== 底部标签 ===== */
  .topic-tag {
    position: absolute;
    top: 60px;
    left: 36px;
    font-size: 11px;
    font-weight: 500;
    color: #8B9E9B;
    letter-spacing: 3px;
    opacity: 0;
    animation: fadeIn 0.5s ease 0.3s forwards;
  }

  .brand {
    position: absolute;
    bottom: 40px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 12px;
    letter-spacing: 4px;
    color: #C4A882;
    opacity: 0;
  }

  /* ===== 动画关键帧 ===== */
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes koalaEnter {
    from { bottom: -200px; }
    to { bottom: -20px; }
  }

  @keyframes koalaSlideLeft {
    from { right: -40px; }
    to { right: 160px; }
  }

  /* ===== 逐步出现的动画类 ===== */
  .step-1 { animation: fadeInUp 0.5s ease 2.0s forwards; }
  .step-2 { animation: fadeInUp 0.5s ease 3.5s forwards; }
  .step-3 { animation: fadeInUp 0.5s ease 5.0s forwards; }
  .step-4 { animation: fadeInUp 0.5s ease 6.5s forwards; }
  .step-5 { animation: fadeInUp 0.5s ease 8.0s forwards; }
  .arrow-1 { animation: fadeIn 0.3s ease 2.8s forwards; }
  .arrow-2 { animation: fadeIn 0.3s ease 4.3s forwards; }
  .arrow-3 { animation: fadeIn 0.3s ease 5.8s forwards; }
  .arrow-4 { animation: fadeIn 0.3s ease 7.3s forwards; }

  .insight-appear { animation: fadeInUp 0.8s ease 10.0s forwards; }
  .brand-appear { animation: fadeIn 0.5s ease 12.0s forwards; }

  /* 判断高亮动画 */
  .highlight-pulse {
    animation: fadeInUp 0.5s ease 3.5s forwards, pulse 1.5s ease 9.0s forwards;
  }

  @keyframes pulse {
    0% { background: #F0EBE5; border-color: #E0D8CE; color: #3D2E2A; transform: scale(1); box-shadow: none; }
    50% { background: #C47D6D; border-color: #C47D6D; color: #FAF7F3; transform: scale(1.12); box-shadow: 0 4px 24px rgba(196,125,109,0.5); }
    100% { background: #C47D6D; border-color: #C47D6D; color: #FAF7F3; transform: scale(1.08); box-shadow: 0 4px 20px rgba(196,125,109,0.4); }
  }

  /* 开场文字隐藏 */
  .opening-hide {
    animation: fadeInUp 0.8s ease 0.5s forwards, fadeOut 0.5s ease 1.8s forwards;
  }

  @keyframes fadeOut {
    from { opacity: 1; }
    to { opacity: 0; }
  }
</style>
</head>
<body>

<div class="phone-frame">
  <!-- 标签 -->
  <div class="topic-tag">原理科普 · #01</div>

  <!-- 开场标题 -->
  <div class="opening-text opening-hide">
    你知道<br>情绪是怎么来的吗？
  </div>

  <!-- 链条 -->
  <div class="chain-area">
    <!-- Step 1: 事件发生 -->
    <div class="chain-step step-1">
      <div class="chain-node">① 事件发生</div>
    </div>
    <div class="chain-arrow-down arrow-1">↓</div>

    <!-- Step 2: 大脑判断 -->
    <div class="chain-step step-2" style="margin-left: 20px;">
      <div class="chain-node highlight-pulse">② 大脑做出判断</div>
    </div>
    <div class="chain-arrow-down arrow-2" style="margin-left: 80px;">↓</div>

    <!-- Step 3: 身体感受 -->
    <div class="chain-step step-3" style="margin-left: 40px;">
      <div class="chain-node">③ 身体产生感受</div>
    </div>
    <div class="chain-arrow-down arrow-3" style="margin-left: 100px;">↓</div>

    <!-- Step 4: 情绪 -->
    <div class="chain-step step-4" style="margin-left: 20px;">
      <div class="chain-node">④ 感受变成情绪</div>
    </div>
    <div class="chain-arrow-down arrow-4" style="margin-left: 80px;">↓</div>

    <!-- Step 5: 反应 -->
    <div class="chain-step step-5">
      <div class="chain-node highlight">⑤ 情绪驱动反应</div>
    </div>
  </div>

  <!-- 关键洞见 -->
  <div class="insight insight-appear">
    <div class="insight-text">
      看见链条<br>
      才有机会在某个环节<br>
      停下来
    </div>
  </div>

  <!-- 考拉 -->
  <img src="koala-ip.png" class="koala pointing" alt="考拉IP">

  <!-- 品牌 -->
  <div class="brand brand-appear">LOVE EGO AI</div>

  <!-- 点击开始提示 -->
  <div id="play-hint" style="position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;z-index:100;cursor:pointer;border-radius:40px;">
    <div style="background:#FAF7F3;padding:20px 32px;border-radius:16px;text-align:center;">
      <div style="font-family:'Noto Serif SC',serif;font-size:18px;color:#1A1412;margin-bottom:8px;">点击播放</div>
      <div style="font-size:13px;color:#8B9E9B;">带声音的科普动画</div>
    </div>
  </div>
</div>

<audio id="voiceover" src="voiceover-01.mp3" preload="auto"></audio>

<script>
  document.getElementById('play-hint').addEventListener('click', function() {
    this.style.display = 'none';
    document.getElementById('voiceover').play();
  });
</script>

</body>
</html>
