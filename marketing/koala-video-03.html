<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>考拉讲解视频 #03 — 自动驾驶</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
    font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
  }

  .frame {
    width: 390px; height: 844px;
    background: #1C1917;
    position: relative; overflow: hidden; border-radius: 24px;
  }

  /* 环境光晕 */
  .glow {
    position: absolute; top: -60px; left: 50%; transform: translateX(-50%);
    width: 480px; height: 360px; border-radius: 50%;
    background: radial-gradient(circle, rgba(196,168,130,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  /* 顶部标签 */
  .tag {
    position: absolute; top: 40px; left: 0; right: 0; text-align: center;
    font-size: 10px; letter-spacing: 4px; color: rgba(196,168,130,0.5);
    opacity: 0; transition: opacity 0.6s;
  }
  .tag.show { opacity: 1; }

  /* ─ Scene 1：开场 ─ */
  .scene-intro {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px; padding: 0 36px; text-align: center;
    opacity: 0; transition: opacity 0.6s ease, transform 0.6s ease;
    transform: scale(1.02);
  }
  .scene-intro.show { opacity: 1; transform: scale(1); }
  .scene-intro.hide { opacity: 0; transform: scale(0.96); }

  .intro-question {
    font-size: 28px; font-weight: 300; color: #FAFAF9; line-height: 1.5;
    opacity: 0; transform: translateY(20px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  .intro-question.show { opacity: 1; transform: translateY(0); }
  .intro-question strong { font-weight: 600; color: #c4a882; }

  .intro-sub {
    font-size: 14px; color: rgba(196,168,130,0.6); line-height: 1.7;
    opacity: 0; transition: opacity 0.6s ease 0.3s;
  }
  .intro-sub.show { opacity: 1; }

  /* ─ Scene 2：三种场景卡片 ─ */
  .scene-cards {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px; padding: 80px 28px 40px;
    opacity: 0; transition: opacity 0.5s ease;
    pointer-events: none;
  }
  .scene-cards.show { opacity: 1; }

  .scene-label {
    font-size: 10px; letter-spacing: 3px; color: rgba(196,168,130,0.5);
    margin-bottom: 4px; align-self: flex-start;
  }

  .card {
    width: 100%;
    background: rgba(250,250,249,0.05);
    border: 1px solid rgba(196,168,130,0.12);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex; align-items: flex-start; gap: 12px;
    opacity: 0; transform: translateX(-16px);
    transition: opacity 0.5s ease, transform 0.5s ease,
                border-color 0.4s, background 0.4s;
  }
  .card.show { opacity: 1; transform: translateX(0); }
  .card.highlight {
    background: rgba(196,168,130,0.1);
    border-color: rgba(196,168,130,0.4);
  }

  .card-icon {
    font-size: 22px; width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .card-body { flex: 1; }
  .card-title { font-size: 13px; font-weight: 500; color: #FAFAF9; margin-bottom: 3px; }
  .card-desc { font-size: 11px; color: rgba(168,162,158,0.8); line-height: 1.5; }

  /* ─ Scene 3：神经路径图 ─ */
  .scene-neural {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 24px; padding: 80px 28px 60px;
    opacity: 0; transition: opacity 0.5s ease;
    pointer-events: none;
  }
  .scene-neural.show { opacity: 1; }

  .neural-title {
    font-size: 16px; font-weight: 400; color: #FAFAF9;
    text-align: center; line-height: 1.5;
    opacity: 0; transition: opacity 0.5s ease;
  }
  .neural-title.show { opacity: 1; }

  /* 路径动画 */
  .path-box {
    width: 100%; display: flex; flex-direction: column; gap: 10px;
    opacity: 0; transition: opacity 0.5s ease 0.2s;
  }
  .path-box.show { opacity: 1; }

  .path-row {
    display: flex; align-items: center; gap: 8px;
  }
  .path-label {
    font-size: 10px; color: rgba(168,162,158,0.6); width: 56px; flex-shrink: 0; text-align: right;
  }
  .path-track {
    flex: 1; height: 8px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden;
  }
  .path-fill {
    height: 100%; border-radius: 4px; width: 0;
    transition: width 1.2s cubic-bezier(0.4,0,0.2,1);
  }
  .path-fill.old { background: linear-gradient(90deg, #c4a882, #a8896a); }
  .path-fill.new { background: linear-gradient(90deg, rgba(196,168,130,0.3), rgba(196,168,130,0.5)); }
  .path-fill.old.expand { width: 92%; }
  .path-fill.new.expand { width: 28%; }

  .path-note {
    font-size: 11px; color: rgba(196,168,130,0.7); text-align: center; line-height: 1.6;
    opacity: 0; transition: opacity 0.5s ease 0.5s;
  }
  .path-note.show { opacity: 1; }

  /* ─ Scene 4：结尾 ─ */
  .scene-end {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
    background: #111;
    opacity: 0; transition: opacity 0.8s ease;
    pointer-events: none;
  }
  .scene-end.show { opacity: 1; }
  .end-logo { font-size: 10px; letter-spacing: 4px; color: #c4a882; }
  .end-text {
    font-size: 22px; font-weight: 300; color: #FAFAF9;
    text-align: center; line-height: 1.6;
  }
  .end-sub { font-size: 11px; color: rgba(168,162,158,0.6); letter-spacing: 1px; margin-top: 4px; }

  /* 考拉 */
  .koala {
    position: absolute; bottom: -50px; right: -20px; width: 190px;
    opacity: 0; transform: translateX(60px) translateY(50px);
    transition: opacity 0.9s cubic-bezier(0.34,1.56,0.64,1),
                transform 0.9s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none; z-index: 5;
  }
  .koala.show { opacity: 1; transform: translateX(0) translateY(0); }

  /* 进度条 */
  .progress {
    position: absolute; bottom: 0; left: 0; height: 3px;
    background: #c4a882; width: 0; border-radius: 0 2px 2px 0;
  }
</style>
</head>
<body>
<div class="frame">
  <div class="glow"></div>

  <p class="tag" id="tag">原理科普 · 03</p>

  <!-- Scene 1: 开场 -->
  <div class="scene-intro" id="sceneIntro">
    <div class="intro-question" id="introQ">
      人有多少行为<br />是<strong>「自动驾驶」</strong>的？
    </div>
    <div class="intro-sub" id="introSub">
      开车到公司，<br />却完全不记得路上发生了什么。
    </div>
  </div>

  <!-- Scene 2: 三种自动场景 -->
  <div class="scene-cards" id="sceneCards">
    <p class="scene-label">情绪反应也是这样的</p>

    <div class="card" id="card1">
      <div class="card-icon">👤</div>
      <div class="card-body">
        <div class="card-title">遇到某类型的人</div>
        <div class="card-desc">自动产生某种感觉——不经过思考</div>
      </div>
    </div>

    <div class="card" id="card2">
      <div class="card-icon">⚡</div>
      <div class="card-body">
        <div class="card-title">遇到压力场景</div>
        <div class="card-desc">自动做出某种反应——不经过选择</div>
      </div>
    </div>

    <div class="card" id="card3">
      <div class="card-icon">🔄</div>
      <div class="card-body">
        <div class="card-title">这些反应</div>
        <div class="card-desc">不是你"选择"的——是神经系统的<br />默认路线</div>
      </div>
    </div>
  </div>

  <!-- Scene 3: 神经路径 -->
  <div class="scene-neural" id="sceneNeural">
    <div class="neural-title" id="neuralTitle">
      一条路走多了<br />就变成了<span style="color:#c4a882">默认路线</span>
    </div>

    <div class="path-box" id="pathBox">
      <div class="path-row">
        <div class="path-label">旧路径</div>
        <div class="path-track">
          <div class="path-fill old" id="oldPath"></div>
        </div>
      </div>
      <div class="path-row">
        <div class="path-label">新路径</div>
        <div class="path-track">
          <div class="path-fill new" id="newPath"></div>
        </div>
      </div>
    </div>

    <div class="path-note" id="pathNote">
      好消息是——<br />
      <span style="color:#c4a882">神经可塑性</span>意味着<br />新的路可以被建立。
    </div>
  </div>

  <!-- Scene 4: 结尾 -->
  <div class="scene-end" id="sceneEnd">
    <p class="end-logo">LOVE EGO AI</p>
    <p class="end-text">你不是你的反应<br />你是能看见反应的那个人</p>
    <p class="end-sub">关注了解更多</p>
  </div>

  <!-- 考拉 -->
  <img class="koala" id="koala" src="koala-ip.png" alt="考拉" />

  <div class="progress" id="progress"></div>
</div>

<script>
const show = id => document.getElementById(id)?.classList.add('show');
const hide = id => document.getElementById(id)?.classList.remove('show');
const TOTAL = 36000;

const tl = [
  [200,  () => show('tag')],
  [500,  () => show('koala')],
  [600,  () => show('sceneIntro')],
  [900,  () => show('introQ')],
  [2000, () => show('introSub')],

  // → Scene 2
  [4500, () => {
    document.getElementById('sceneIntro').classList.add('hide');
    setTimeout(() => document.getElementById('sceneIntro').classList.remove('show'), 500);
    show('sceneCards');
  }],
  [5200, () => show('card1')],
  [6400, () => show('card2')],
  [7600, () => show('card3')],
  [9000, () => document.getElementById('card3')?.classList.add('highlight')],

  // → Scene 3
  [13000, () => {
    hide('sceneCards');
    show('sceneNeural');
    show('neuralTitle');
    setTimeout(() => {
      show('pathBox');
      setTimeout(() => {
        document.getElementById('oldPath')?.classList.add('expand');
        setTimeout(() => {
          document.getElementById('newPath')?.classList.add('expand');
          show('pathNote');
        }, 600);
      }, 200);
    }, 600);
  }],

  // → Scene 4
  [30000, () => show('sceneEnd')],
];

// 进度条
const progressEl = document.getElementById('progress');
let startTime = null;
function tick(ts) {
  if (!startTime) startTime = ts;
  const pct = Math.min((ts - startTime) / TOTAL * 100, 100);
  progressEl.style.width = pct + '%';
  if (ts - startTime < TOTAL) requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

tl.forEach(([d, fn]) => setTimeout(fn, d));
setTimeout(() => location.reload(), TOTAL + 1000);
</script>
</body>
</html>
