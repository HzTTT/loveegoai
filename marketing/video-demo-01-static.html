<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo #01 — 静态最终帧</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Noto Sans SC', sans-serif;
  }

  .phone-frame {
    width: 390px;
    height: 844px;
    background: #FAFAF8;
    border-radius: 40px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 0 60px rgba(0,0,0,0.5);
  }

  .topic-tag {
    position: absolute;
    top: 60px;
    left: 36px;
    font-size: 11px;
    font-weight: 500;
    color: #8B9E9B;
    letter-spacing: 3px;
  }

  .chain-area {
    position: absolute;
    top: 110px;
    left: 36px;
    right: 36px;
  }

  .chain-step {
    display: flex;
    align-items: center;
    margin-bottom: 6px;
  }

  .chain-node {
    background: #F0EBE5;
    border: 2px solid #E0D8CE;
    border-radius: 28px;
    padding: 10px 20px;
    font-size: 15px;
    font-weight: 500;
    color: #3D2E2A;
    white-space: nowrap;
  }

  .chain-node.end {
    background: #3D2E2A;
    border-color: #3D2E2A;
    color: #FAF7F3;
  }

  .chain-node.key {
    background: #C47D6D;
    border-color: #C47D6D;
    color: #FAF7F3;
    transform: scale(1.08);
    box-shadow: 0 4px 20px rgba(196,125,109,0.4);
  }

  .chain-arrow-down {
    text-align: center;
    font-size: 20px;
    color: #C4A882;
    padding: 2px 0;
    margin-left: 60px;
  }

  .key-label {
    font-size: 11px;
    color: #C47D6D;
    margin-left: 12px;
    font-weight: 500;
  }

  .insight {
    position: absolute;
    bottom: 190px;
    left: 36px;
    right: 36px;
    text-align: center;
  }

  .insight-text {
    font-family: 'Noto Serif SC', serif;
    font-size: 18px;
    font-weight: 600;
    color: #1A1412;
    line-height: 1.8;
    padding: 20px;
    border-top: 1.5px solid #E8D5CC;
    border-bottom: 1.5px solid #E8D5CC;
  }

  .koala {
    position: absolute;
    bottom: -20px;
    right: -30px;
    width: 180px;
    z-index: 10;
  }

  .brand {
    position: absolute;
    bottom: 40px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 12px;
    letter-spacing: 4px;
    color: #C4A882;
    opacity: 0.6;
  }
</style>
</head>
<body>

<div class="phone-frame">
  <div class="topic-tag">原理科普 · #01</div>

  <div class="chain-area">
    <div class="chain-step">
      <div class="chain-node">① 事件发生</div>
    </div>
    <div class="chain-arrow-down">↓</div>

    <div class="chain-step" style="margin-left: 20px;">
      <div class="chain-node key">② 大脑做出判断</div>
      <span class="key-label">← 关键环节</span>
    </div>
    <div class="chain-arrow-down" style="margin-left: 80px;">↓</div>

    <div class="chain-step" style="margin-left: 40px;">
      <div class="chain-node">③ 身体产生感受</div>
    </div>
    <div class="chain-arrow-down" style="margin-left: 100px;">↓</div>

    <div class="chain-step" style="margin-left: 20px;">
      <div class="chain-node">④ 感受变成情绪</div>
    </div>
    <div class="chain-arrow-down" style="margin-left: 80px;">↓</div>

    <div class="chain-step">
      <div class="chain-node end">⑤ 情绪驱动反应</div>
    </div>
  </div>

  <div class="insight">
    <div class="insight-text">
      看见链条<br>
      才有机会在某个环节<br>
      停下来
    </div>
  </div>

  <img src="koala-ip.png" class="koala" alt="考拉IP">

  <div class="brand">LOVE EGO AI</div>
</div>

</body>
</html>
